version: '3.9'

services:
  # ─── PostgreSQL + pgvector ───
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realty_secret}
      POSTGRES_DB: ${POSTGRES_DB:-realty_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realty}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-realty}:${POSTGRES_PASSWORD:-realty_secret}@postgres:5432/${POSTGRES_DB:-realty_ai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - tmp_data:/app/tmp

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ../dashboard
      dockerfile: ../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    depends_on:
      - backend

  # ─── Re-engagement Cron Worker ───
  cron-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "execution.reengagement_cron"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-realty}:${POSTGRES_PASSWORD:-realty_secret}@postgres:5432/${POSTGRES_DB:-realty_ai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  tmp_data:
